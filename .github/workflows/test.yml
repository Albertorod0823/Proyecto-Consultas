name: Validar proyecto web

on: [push, pull_request]

jobs:
  validate-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Instalar validador HTML
        run: npm install -g html-validate
      - name: Validar HTML
        run: html-validate index.html

  validate-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Instalar Jest
        run: npm install -g jest
      - name: Correr pruebas JS
        run: jest --testPathPattern=test.js
